name: deviser

replicas: 3

image:
  repository: ghcr.io/krateoplatformops/deviser
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  automount: false

service:
  port: 8081

config:
  DEBUG: "false"
  PORT: "8081"

  DB_READY_TIMEOUT: "4m"

  # Number of days ahead to create partitions
  DB_PARTITIONS_DAYS: "3"

  # Maximum total size in bytes
  # PM_MAX_PARTITIONS_SIZE: "1073741824"

  # Number of days to retain partitions
  # PM_RETENTION_DAYS: "2"

  # Quota trigger ratio
  # PM_TRIGGER_RATIO: "0.75"

  # Quota target ratio
  # PM_TARGET_RATIO: "0.60"

secret:
  create: false
  name: eventrouter-db

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    path: /livez
    initialDelaySeconds: 10
    periodSeconds: 15

