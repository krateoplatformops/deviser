apiVersion: v1
kind: Namespace
metadata:
  name: demo-system
---
# ---------------------------------------------
# DEPLOYMENT: deviser (long-running daemon)
# ---------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deviser
  namespace: demo-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deviser
  template:
    metadata:
      labels:
        app: deviser
    spec:
      containers:
        - name: deviser
          image: kind.local/deviser:latest
          imagePullPolicy: Never
          env:
            - name: DEBUG
              value: "true"
            - name: DB_URL
              value: "postgres://test:test@postgres.demo-system.svc.cluster.local:5432/testdb?sslmode=disable"
            - name: DB_READY_TIMEOUT
              value: "2m"
            - name: DB_PARTITIONS_DAYS
              value: "7"
            - name: PORT
              value: "8081"
          ports:
            - name: http
              containerPort: 8081

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
